<!DOCTYPE html>
<html>
<head><title>DMS Bot - OAuth Callback</title></head>
<body>
<h2>Redirecting to DMS Bot...</h2>
<p id="status">Forwarding authorization code to localhost...</p>
<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
const error = params.get('error');
if (code) {
  window.location.href = 'http://localhost:8923/callback?code=' + encodeURIComponent(code);
} else if (error) {
  document.getElementById('status').textContent = 'Authorization failed: ' + error;
} else {
  document.getElementById('status').textContent = 'No authorization code received.';
}
</script>
</body>
</html>
